    <!-- PWA / Splash -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Flutterwave Inline Checkout -->
    <script src="https://checkout.flutterwave.com/v3.js"></script>

    <!-- Splash screen background while React loads -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a1a0c;
        min-height: 100vh;
      }
      /* African geometric pattern background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url('pattern.jpg');
        background-size: cover;
        background-position: center;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }
      #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }
      #splash {
        position: fixed;
        inset: 0;
        background: #0a1a0c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        font-size: 72px;
        margin-bottom: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash-name {
        font-family: -apple-system, 'Segoe UI', sans-serif;
        font-weight: 900;
        font-size: 28px;
        color: #fff;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      #splash-tagline {
        font-family: -apple-system, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: rgba(134, 239, 172, 0.5);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      #splash-bar {
        position: absolute;
        bottom: 60px;
        width: 48px;
        height: 3px;
        background: rgba(34, 197, 94, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }
      #splash-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: #22c55e;
        border-radius: 2px;
        animation: load 1.2s ease-in-out forwards;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @keyframes load {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }
    </style>
